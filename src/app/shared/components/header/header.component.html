<header class="header-container glass-panel">
  <div class="brand">
    <div class="logo">O</div>
    <div class="brand-info">
      <h1>Observatory</h1>
      <p>Londo Tech Monitor</p>
    </div>
  </div>

  <nav class="navigation" *ngIf="authService.isAuthenticated()">
    <div class="nav-links">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a
        class="nav-link"
        *ngIf="projectService.selectedProjectId()"
        [routerLink]="['/logs/project', projectService.selectedProjectId()]"
        routerLinkActive="active"
      >
        Project Logs
      </a>
    </div>
    <div class="selector-wrapper">
      <label for="project-select">Project:</label>
      <select
        id="project-select"
        class="form-input project-select"
        [ngModel]="projectService.selectedProjectId()"
        (ngModelChange)="onProjectChange($event)"
      >
        <option *ngFor="let p of projects" [value]="p._id">{{ p.name }}</option>
      </select>
      <button class="btn btn-icon" (click)="showCreateModal = true" title="Add Project">+</button>
    </div>
  </nav>

  <div class="header-right">
    <button
      class="btn-theme-toggle"
      (click)="themeService.toggleTheme()"
      [title]="themeService.theme() === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
    >
      {{ themeService.theme() === 'dark' ? '☀️' : '🌙' }}
    </button>

    <div class="user-profile" *ngIf="authService.isAuthenticated()">
      <div class="user-avatar">{{ userInitial }}</div>
      <div class="user-details">
        <span class="username">{{ authService.currentUser() }}</span>
        <button class="btn-logout" (click)="logout()">Logout</button>
      </div>
    </div>
  </div>
</header>

<!-- Create Project Modal -->
<div class="modal-backdrop" *ngIf="showCreateModal">
  <div class="modal-content glass-panel">
    <h2>Register New Project</h2>
    <div class="form-group">
      <label for="new-project-name">Project Name</label>
      <input
        type="text"
        id="new-project-name"
        class="form-input"
        placeholder="e.g. MyCimencam"
        [(ngModel)]="newProjectName"
      />
    </div>
    <div class="form-group">
      <label for="new-project-desc">Description</label>
      <input
        type="text"
        id="new-project-desc"
        class="form-input"
        placeholder="Infrastructure overview"
        [(ngModel)]="newProjectDesc"
      />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" (click)="showCreateModal = false">Cancel</button>
      <button class="btn btn-primary" (click)="createProject()">Register</button>
    </div>
  </div>
</div>
