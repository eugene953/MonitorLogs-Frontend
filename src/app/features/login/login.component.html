<div class="login-page">
  <div class="login-card glass-panel">
    <button 
      type="button" 
      class="btn-theme-toggle-login" 
      (click)="themeService.toggleTheme()" 
      [title]="themeService.theme() === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
    >
      {{ themeService.theme() === 'dark' ? '☀️' : '🌙' }}
    </button>

    <div class="login-header">
      <div class="logo-ring">
        <span class="logo-icon">O</span>
      </div>
      <h1>Observatory</h1>
      <p>Londo Technology Monitoring Platform</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input
          type="text"
          id="login-username"
          class="form-input"
          placeholder="Enter your username"
          [(ngModel)]="username"
          name="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input
          type="password"
          id="login-password"
          class="form-input"
          placeholder="Enter your password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <p class="login-footer">Monitoring · Observability · Real-time</p>
  </div>

  <!-- Ambient background glows -->
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>
  <div class="ambient ambient-3"></div>
</div>
